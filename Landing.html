<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Centre Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

</head>
<body>
<nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <!-- Brand -->
    <a class="navbar-brand" href="#">Electronic Registration</a>

    <!-- Toggler/collapsibe Button -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar links -->
    <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="#">Update Contacts</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Sign Out</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Help</a>
            </li>
        </ul>
    </div>
</nav>
<div class="box-body">
</div>

    <label>Centre Number:<span th:each="Centre: ${centres}" th:text="${Centre.centreNo}"></span></label>
    <label>Centre Name:<span th:each="Centre: ${centres}" th:text="${Centre.centreName}"></span></label>
    <label>Centre Region:<span th:each="Centre: ${centres}" th:text="${Centre.region}"></span></label>
    <label>Centre Contact:<span th:each="Centre: ${centres}" th:text="${Centre.mobile}"></span></label>
    <label>Alternate Contact:<span th:each="Centre: ${centres}" th:text="${Centre.altMobile}"></span></label>
</div>
    <a th:href="@{/getListStudents}" button type="submit" class="btn btn-primary">Continue</a>

</div>
</body>
</html>
